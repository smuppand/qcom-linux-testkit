metadata:
  name: diag-functional-validation
  format: "Lava-Test Test Definition 1.0"
  description: "Validate Qualcomm DIAG userspace infrastructure, normal and non-real-time diag_mdlog logging, output generation, and safe process cleanup."
  os:
    - linux
  scope:
    - functional

params:
  DIAG_DURATION_SECS: "10"
  DIAG_NRT_DURATION_SECS: "5"
  DIAG_STARTUP_TIMEOUT_SECS: "15"
  DIAG_STOP_TIMEOUT_SECS: "10"
  DIAG_FILE_SIZE: "20"
  DIAG_FILE_COUNT: "2"
  DIAG_TEST_NONREALTIME: "1"
  DIAG_KEEP_ARTIFACTS: "1"
  DIAG_PROBE_OPTIONAL_HELP: "0"
  DIAG_ARTIFACT_DIR: "./diag_artifacts"

  DIAG_MASK_FILE: ""
  DIAG_MASK_LIST: ""
  DIAG_PERIPHERAL_MASK: ""
  DIAG_PROCESSOR_MASK: ""
  DIAG_USERPD_MASK: ""
  DIAG_QDSS_MASK: ""
  DIAG_TX_MODE: ""
  DIAG_BUFFER_PERIPHERAL_MASK: ""
  DIAG_ETR_BUFFER_SIZE: ""
  DIAG_QMDL2_V2: "0"

run:
  steps:
    - REPO_PATH=$PWD
    - cd Runner/suites/System/Logging/DIAG_Functional_Validation
    - DIAG_DURATION_SECS="${DIAG_DURATION_SECS}" DIAG_NRT_DURATION_SECS="${DIAG_NRT_DURATION_SECS}" DIAG_STARTUP_TIMEOUT_SECS="${DIAG_STARTUP_TIMEOUT_SECS}" DIAG_STOP_TIMEOUT_SECS="${DIAG_STOP_TIMEOUT_SECS}" DIAG_FILE_SIZE="${DIAG_FILE_SIZE}" DIAG_FILE_COUNT="${DIAG_FILE_COUNT}" DIAG_TEST_NONREALTIME="${DIAG_TEST_NONREALTIME}" DIAG_KEEP_ARTIFACTS="${DIAG_KEEP_ARTIFACTS}" DIAG_PROBE_OPTIONAL_HELP="${DIAG_PROBE_OPTIONAL_HELP}" DIAG_ARTIFACT_DIR="${DIAG_ARTIFACT_DIR}" DIAG_MASK_FILE="${DIAG_MASK_FILE}" DIAG_MASK_LIST="${DIAG_MASK_LIST}" DIAG_PERIPHERAL_MASK="${DIAG_PERIPHERAL_MASK}" DIAG_PROCESSOR_MASK="${DIAG_PROCESSOR_MASK}" DIAG_USERPD_MASK="${DIAG_USERPD_MASK}" DIAG_QDSS_MASK="${DIAG_QDSS_MASK}" DIAG_TX_MODE="${DIAG_TX_MODE}" DIAG_BUFFER_PERIPHERAL_MASK="${DIAG_BUFFER_PERIPHERAL_MASK}" DIAG_ETR_BUFFER_SIZE="${DIAG_ETR_BUFFER_SIZE}" DIAG_QMDL2_V2="${DIAG_QMDL2_V2}" ./run.sh || true
    - $REPO_PATH/Runner/utils/send-to-lava.sh DIAG_Functional_Validation.res || true
